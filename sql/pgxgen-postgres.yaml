                            - created_at
        store_api_keys:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                    delete: {}
                    get:
                        name: GetById
                    update:
                        name: UpdateStatus
                        returning: '*'
                        skip_columns:
                            - id
                            - key
                            - store_id
                            - created_at
        store_currencies: {}
        store_aml_settings: {}
        store_webhooks:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    delete: {}
                    get:
                        name: GetById
                    update:
                        returning: '*'
                        skip_columns:
                            - id
                            - store_id
                            - secret
                            - created_at
        store_whitelist:
            crud:
                methods:
                    create:
                        returning: '*'
                    find:
                        where:
                            store_id: {}
        stores:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - minimal_payment
                            - rate_scale
                            - deleted_at
                            - updated_at
                            - slug
                        column_values:
                            created_at: now()
                    find:
                        name: GetAll
                        where:
                            deleted_at:
                                value: IS NULL
                        limit: true
                        order:
                            by: created_at
                    get:
                        name: GetByID
                    update:
                        returning: '*'
                        skip_columns:
                            - id
                            - user_id
                            - created_at
                            - deleted_at
        transactions:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                            created_at_index: extract(epoch from now()) * 1000
                    get:
                        name: GetById
        transfer_transactions:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                        column_values:
                            created_at: now()
        transfers:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - number
                        column_values:
                            created_at: now()
                            updated_at: now()
                    find:
                        name: GetAll
                        limit: true
                        order:
                            by: created_at
                    get:
                        name: GetById
        tron_wallet_balance_statistics:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                        column_values:
                            created_at: now()
        unconfirmed_transactions:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                            created_at_index: extract(epoch from now()) * 1000
                    get:
                        name: GetById
        update_balance_queue:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - created_at
                            - updated_at
                    delete: {}
        user_exchange_pairs:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    find:
                        where:
                            exchange_id: {}
                            user_id: {}
        user_exchanges:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
        user_notifications:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                    get:
                        name: GetByID
                        returning: '*'
                        where:
                            id: {}
        user_stores:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                        column_values:
                            created_at: now()
        users:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    delete: {}
                    find:
                        name: GetAll
                        where:
                            deleted_at:
                                value: IS NULL
                        skip_columns:
                            - password
                        limit: true
                        order:
                            by: created_at
                    update:
                        returning: '*'
                        skip_columns:
