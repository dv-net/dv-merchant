                            - email
                            - email_verified_at
                            - password
                            - remember_token
                            - processing_owner_id
                            - dvnet_token
                            - two_fa_reset_expires_at
                            - banned
                            - rate_scale
                            - deleted_at
                            - created_at
                        column_values:
                            updated_at: now()
        wallet_addresses:
            primary_column: id
            sqlc:
                query_parameter_limit: 2
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - amount
                            - updated_at
                            - deleted_at
                        column_values:
                            created_at: now()
                    get:
                        name: GetById
                        where:
                            deleted_at:
                                value: IS NULL
        wallet_addresses_activity_logs:
            primary_column: id
            sqlc:
                query_parameter_limit: 2
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
        wallets:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                            - deleted_at
                        column_values:
                            created_at: now()
                    get:
                        name: GetById
                        where:
                            deleted_at:
                                value: IS NULL
        webhook_send_histories:
