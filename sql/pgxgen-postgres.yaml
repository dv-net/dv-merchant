version: "2"
schemas:
    - name: main
      engine: postgresql
      schema_dir: postgres/migrations
      models:
        output_dir: ../internal/models
        output_file_name: models_gen.go
        package_name: models
        package_path: github.com/dv-net/dv-merchant/internal/models
        include_struct_comments: true
        custom_types:
            - Blockchain
            - TransferKind
            - TransferStatus
            - TransferStage
            - WebhookEvent
            - ReceiptStatus
            - TransactionsType
            - ExchangeSlug
            - ExchangeKeyName
            - NotificationType
            - NotificationCategory
            - DeliveryChannel
            - MessageLogLevel
            - OrderSide
            - WithdrawalHistoryStatus
            - ExchangeOrderStatus
            - ExchangeWithdrawalState
            - ExchangeSwapState
            - RateSource
            - MultiWithdrawalMode
            - TransferTransactionType
            - TransferTransactionsStatus
            - AMLSlug
            - AmlKeyType
            - AMLCheckStatus
            - AmlRiskLevel
            - NotificationArgs
            - AddressBookType
        emit_json_tags: true
        emit_db_tags: true
      sqlc:
        defaults:
            sql_package: pgx/v5
            emit_prepared_queries: false
            emit_interface: true
            emit_json_tags: true
            emit_db_tags: true
            emit_exported_queries: false
            emit_exact_table_names: false
            emit_empty_slices: true
            emit_result_struct_pointers: true
            emit_params_struct_pointers: false
            emit_enum_valid_method: true
            emit_all_enum_values: true
        overrides:
            types:
                - db_type: uuid
                  go_type: github.com/google/uuid.UUID
                - db_type: uuid
                  go_type: github.com/google/uuid.NullUUID
                  nullable: true
                - db_type: pg_catalog.numeric
                  go_type: github.com/shopspring/decimal.Decimal
                - db_type: pg_catalog.numeric
                  go_type: github.com/shopspring/decimal.NullDecimal
                  nullable: true
            columns:
                - column: currencies.blockchain
                  go_type:
                    type: '*Blockchain'
                - column: currencies.withdrawal_min_balance
                  go_type:
                    type: '*decimal.Decimal'
                - column: users.email
                  go_struct_tag: validate:"required,email"
                - column: users.password
                  go_struct_tag: validate:"required,min=8,max=32"
                - column: users.location
                  go_type:
                    type: string
                  go_struct_tag: validate:"required,timezone"
                - column: users.exchange_slug
                  go_type:
                    type: '*ExchangeSlug'
                - column: users.rate_source
                  go_type:
                    type: RateSource
                - column: personal_access_tokens.expires_at
                  go_type:
                    type: '*time.Time'
                - column: stores.site
                  go_type:
                    type: '*string'
                - column: stores.return_url
                  go_type:
                    type: '*string'
                - column: stores.success_url
                  go_type:
                    type: '*string'
                - column: stores.rate_scale
                  go_type:
                    type: decimal.Decimal
                - column: stores.minimal_payment
                  go_type:
                    type: decimal.Decimal
                - column: stores.public_payment_form_enabled
                  go_type:
                    type: bool
                - column: stores.rate_source
                  go_type:
                    type: RateSource
                - column: store_webhooks.events
                  go_type:
                    type: '[]*WebhookEvent'
                - column: webhook_send_histories.type
                  go_type:
                    type: string
                - column: webhook_send_histories.status
                  go_type:
                    type: string
                - column: webhook_send_histories.response
                  go_type:
                    type: '*string'
                - column: webhook_send_histories.response_status_code
                  go_type:
                    type: int
                - column: wallet_addresses.blockchain
                  go_type:
                    type: Blockchain
                - column: wallet_addresses.amount
                  go_type:
                    type: decimal.Decimal
                - column: withdrawal_wallets.type
                  go_type:
                    type: WithdrawalWalletType
                - column: withdrawal_wallets.blockchain
                  go_type:
                    type: Blockchain
                - column: withdrawal_wallets.withdrawal_min_balance
                  go_type:
                    type: decimal.NullDecimal
                - column: withdrawal_wallet_addresses.name
                  go_type:
                    type: '*string'
                - column: multi_withdrawal_rules.mode
                  go_type:
                    type: MultiWithdrawalMode
                - column: receipts.status
                  go_type:
                    type: ReceiptStatus
                - column: transfers.kind
                  go_type:
                    type: TransferKind
                - column: transfers.status
                  go_type:
                    type: TransferStatus
                - column: transfers.stage
                  go_type:
                    type: TransferStage
                - column: transfers.blockchain
                  go_type:
                    type: Blockchain
                - column: transfers.message
                  go_type:
                    type: '*string'
                - column: transfers.step
                  go_type:
                    type: '*string'
                - column: transfers.tx_hash
                  go_type:
                    type: '*string'
                - column: transfer_transactions.tx_type
                  go_type:
                    type: TransferTransactionType
                - column: transfer_transactions.status
                  go_type:
                    type: TransferTransactionsStatus
                - column: transactions.bc_uniq_key
                  go_type:
                    type: '*string'
                - column: transactions.type
                  go_type:
                    type: TransactionsType
                - column: transactions.from_address
                  go_type:
                    type: string
                - column: transactions.blockchain
                  go_type:
                    type: Blockchain
                - column: exchange_withdrawal_history.status
                  go_type:
                    type: WithdrawalHistoryStatus
                - column: unconfirmed_transactions.bc_uniq_key
                  go_type:
                    type: '*string'
                - column: unconfirmed_transactions.type
                  go_type:
                    type: TransactionsType
                - column: unconfirmed_transactions.from_address
                  go_type:
                    type: string
                - column: unconfirmed_transactions.blockchain
                  go_type:
                    type: Blockchain
                - column: settings.model_type
                  go_type:
                    type: '*string'
                - column: exchanges.slug
                  go_type:
                    type: ExchangeSlug
                - column: exchange_keys.name
                  go_type:
                    type: ExchangeKeyName
                - column: notification_send_history.type
                  go_type:
                    type: NotificationType
                - column: notification_send_history.channel
                  go_type:
                    type: DeliveryChannel
                - column: notification_send_queue.channel
                  go_type:
                    type: DeliveryChannel
                - column: notification_send_queue.type
                  go_type:
                    type: NotificationType
                - column: notification_send_queue.args
                  go_type:
                    type: '*NotificationArgs'
                - column: notifications.type
                  go_type:
                    type: NotificationType
                - column: notifications.category
                  go_type:
                    type: '*NotificationCategory'
                - column: exchange_orders.side
                  go_type:
                    type: OrderSide
                - column: exchange_orders.status
                  go_type:
                    type: ExchangeOrderStatus
                - column: user_exchange_pairs.type
                  go_type:
                    type: OrderSide
                - column: exchange_chains.slug
                  go_type:
                    type: ExchangeSlug
                - column: user_exchanges.withdrawal_state
                  go_type:
                    type: ExchangeWithdrawalState
                - column: user_exchanges.swap_state
                  go_type:
                    type: ExchangeSwapState
                - column: withdrawal_from_processing_wallets.request_id
                  go_type:
                    type: '*string'
                - column: aml_services.slug
                  go_type:
                    type: AMLSlug
                - column: aml_service_keys.name
                  go_type:
                    type: AmlKeyType
                - column: aml_checks.status
                  go_type:
                    type: AMLCheckStatus
                - column: aml_checks.risk_level
                  go_type:
                    type: '*AmlRiskLevel'
                - column: aml_supported_assets.service_slug
                  go_type:
                    type: AMLSlug
                - column: user_address_book.blockchain
                  go_type:
                    type: '*Blockchain'
                - column: user_address_book.type
                  go_type:
                    type: AddressBookType
                - column: store_aml_settings.provider_slug
                  go_type:
                    type: '*AMLSlug'
      defaults:
        queries_dir_prefix: postgres/queries
        output_dir_prefix: ../internal/storage/repos
        package_prefix: "repo_"
        crud:
            auto_clean: true
            exclude_table_name: true
      tables:
        aml_check_history:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
        aml_check_queue:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        skip_columns:
                            - id
                            - updated_at
                            - attempts
                        column_values:
                            created_at: now()
        aml_checks:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                        column_values:
                            created_at: now()
        aml_service_keys:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                        column_values:
                            created_at: now()
        aml_services:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    get:
                        name: GetByID
                        returning: '*'
                        where:
                            id: {}
        aml_supported_assets:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    find: {}
        aml_user_keys:
            primary_column: id
            sqlc:
                query_parameter_limit: 3
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                        column_values:
                            created_at: now()
        currencies:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - updated_at
                    find:
                        name: GetAll
                    get:
                        name: GetByID
        exchange_addresses:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    find:
                        name: GetAllByUser
                        where:
                            exchange_id: {}
                            user_id: {}
        exchange_chains:
            primary_column: id
            crud:
                methods:
                    get:
                        name: GetByID
                        returning: '*'
        exchange_orders:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    get:
                        name: GetByID
        exchange_user_keys:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
        exchange_withdrawal_history:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                            - txid
                        column_values:
                            created_at: now()
        exchange_withdrawal_settings:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - is_enabled
                            - updated_at
                        column_values:
                            created_at: now()
        exchanges:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    find:
                        name: GetAll
                    get:
                        name: GetByID
        log_types:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    get:
                        name: GetByID
                        returning: '*'
                        where:
                            id: {}
                    update:
                        name: Update
                        returning: '*'
                        skip_columns:
                            - id
                            - created_at
                        column_values:
                            updated_at: now()
        logs:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    get:
                        name: GetByID
                        returning: '*'
                        where:
                            id: {}
                    update:
                        name: Update
                        returning: '*'
                        skip_columns:
                            - id
                            - created_at
                        column_values:
                            updated_at: now()
        multi_withdrawal_rules:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
        notification_send_history:
            primary_column: id
            crud:
                methods:
                    create:
                        skip_columns:
                            - id
                            - updated_at
                            - sent_at
                        column_values:
                            created_at: now()
                    get:
                        name: GetById
                    update:
                        returning: '*'
                        where:
                            destination: {}
                        skip_columns:
                            - id
                            - destination
                            - created_at
                            - type
                            - channel
                            - message_text
                            - sender
                        column_values:
                            updated_at: now()
        notification_send_queue:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                            - attempts
                        column_values:
                            created_at: now()
                    delete: {}
                    get:
                        name: GetById
        notifications:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                    get:
                        name: GetByID
                        returning: '*'
                        where:
                            id: {}
        personal_access_tokens:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                            - last_used_at
                    delete: {}
        receipts:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    find:
                        name: GetAll
                        limit: true
                        order:
                            by: created_at
                    get:
                        name: GetByID
        settings:
            primary_column: id
            crud:
                methods:
                    create:
                        returning: '*'
                        skip_columns:
                            - id
                            - updated_at
                        column_values:
                            created_at: now()
                    update:
                        returning: '*'
                        skip_columns:
